    <linearGradient id="orbit" x1="164" y1="74" x2="636" y2="338" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8D591"/>
      <stop offset="1" stop-color="#C88133"/>
    </linearGradient>
    <linearGradient id="accent" x1="980" y1="148" x2="1454" y2="354" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6AA8FF"/>
      <stop offset="1" stop-color="#D8EEFF"/>
    </linearGradient>
    <filter id="blurLg" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="blurMd" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
