<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Epheon banner</title>
  <desc id="desc">A dark space-themed banner with deep black cosmos, stars, orbital lines, and the Epheon logotype.</desc>
  <defs>
    <linearGradient id="bg" x1="180" y1="40" x2="1420" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020409"/>
      <stop offset="0.45" stop-color="#050913"/>
      <stop offset="1" stop-color="#0A1220"/>
    </linearGradient>
    <radialGradient id="nebulaLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(290 142) rotate(18) scale(360 250)">
      <stop stop-color="#5B84FF" stop-opacity="0.22"/>
      <stop offset="0.42" stop-color="#264CBA" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#264CBA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebulaRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1370 370) rotate(-18) scale(340 240)">
      <stop stop-color="#7DD3FC" stop-opacity="0.12"/>
      <stop offset="0.56" stop-color="#1D4ED8" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#1D4ED8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sunGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(354 188) scale(148)">
